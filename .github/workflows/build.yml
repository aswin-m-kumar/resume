name: Build Resume PDFs

on:
  push:
    branches: [ main ]

jobs:
  build-latex:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Compile AIoT Resume
      uses: xu-cheng/latex-action@v2
      with:
        root_file: resume-aiot.tex

    - name: Compile Core Resume
      uses: xu-cheng/latex-action@v2
      with:
        root_file: resume-core.tex

    - name: Rename PDFs
      run: |
        mv resume-aiot.pdf Aswin_M_Kumar-Resume-AIoT.pdf
        mv resume-core.pdf Aswin_M_Kumar-Resume-Core.pdf

    - name: Commit and push updated PDFs
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add Aswin_M_Kumar-Resume-AIoT.pdf Aswin_M_Kumar-Resume-Core.pdf
        git diff --cached --quiet || git commit -m "Auto-update resume PDFs [AIoT + Core]"
        git push
